<!DOCTYPE html>
<html lang="es">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEWMIS Box</title>

  <style>
    .header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

#modeBadge {
  background: #1e293b;
  color: #4fc3f7;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: bold;
}
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1720;
      color: white;
      padding: 20px;
    }

    .card {
      max-width: 420px;
      margin: auto;
      background: #101820;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.35);
    }

    h1 {
      margin-top: 0;
      color: #4fc3f7;
      font-size: 28px;
    }

    .label {
      color: #b0bec5;
      font-size: 14px;
      margin-top: 18px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 4px;
    }

    .money {
      color: #ffd54f;
      font-size: 36px;
    }

    .state {
      color: #66bb6a;
    }

    .small {
      margin-top: 20px;
      color: #90a4ae;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="title">LEWMIS</h1>

    <div class="label">Producto</div>
    <div class="value" id="product">-</div>

    <div class="label">Precio</div>
    <div class="value" id="price">-</div>

    <div id="transportExtra" style="display:none;">
  <div class="label">Salida</div>
  <div class="value" id="transportBase">-</div>
</div>
<div id="transportExtra" style="display:none;">
  <div class="label">Salida</div>
  <div class="value" id="transportBase">-</div>
</div>

<div class="label" id="weightLabel">Peso</div>
<div class="value" id="weight">-</div>

<div id="transportDeltaBlock" style="display:none;">
  <div class="label">Delta</div>
  <div class="value" id="transportDelta">-</div>
</div>

<div id="fieldExtra" style="display:none;">
  <div class="label">Meta</div>
  <div class="value" id="fieldTarget">-</div>
</div>

    <div id="inventoryExtra" style="display:none;">
  <div class="label">Base</div>
  <div class="value" id="inventoryBase">-</div>

  <div class="label">Delta</div>
  <div class="value" id="inventoryDelta">-</div>
</div>

    <div id="amountBlock">
  <div class="label" id="amountLabel">A pagar</div>
  <div class="value money" id="amount">$ 0,00</div>
</div>

    <div class="label">Estado</div>
    <div class="value state" id="state">-</div>

    <div class="label">Batería</div>
    <div class="value" id="battery">-</div>

    <div class="small" id="updated">Última actualización: -</div>
  </div>

<script src="app.js?v=1"></script> 
</body>
</html>
